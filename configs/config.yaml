# Main configuration file for B2Diff training pipeline
# This replaces the bash script configuration with a Hydra-based approach

defaults:
  - _self_

# General settings
exp_name: "incremental_b2diffu_rl"
seed: 42
save_path: "./model/lora"
mixed_precision: "fp16"
allow_tf32: false
use_lora: true
lora_rank: 16  # Increase from 4 for more learning capacity (8, 16, 32, 64)
lora_alpha: 16  # Scale of LoRA updates (recommend: same as lora_rank)
lora_dropout: 0.0
resume_id: "" #wandb run id to resume from
dev_id: 0

# Pipeline settings (from bash script)
pipeline:
  continue_from_stage: 0
  stage_cnt: 100
  split_step_left: 14
  split_step_right: 20
  save_interval: 2
  sleep_between_stages: 2

# Split settings (will be calculated per stage)
split_step: 14
split_time: 3

# Prompt settings
prompt: ""
prompt_file: "configs/prompt/template1_train.json"
prompt_random_choose: 1
reward_fn: "clip"

# Model Selection: 2D (Stable Diffusion) vs 3D (MiDiffusion)
threed_scene_layout: false  # Set to true to use MiDiffusion for 3D scene generation
# 3D reward function selection
# threed_reward: "penetration" (default), "tv_bed", or "boundary"
# tv_bed: legacy flag; if threed_reward is unset, tv_bed=true uses tv_bed reward
tv_bed: false
threed_reward: "penetration"
# Universal + custom reward composition
universal_rewards: false
custom_reward: null  # e.g., "tv_bed"; null disables custom reward
object_count_mode: "nll"  # kl, nll, gaussian
# Pretrained model (2D - Stable Diffusion)
pretrained:
  model: "CompVis/stable-diffusion-v1-4"
  revision: "main"

# MiDiffusion configuration (3D scene layout generation)
# Only used when 3d_scene_layout: true
midiffusion:
  # Paths
  floor_conditions: "/media/ajad/YourBook/AshokSaugatResearchBackup/AshokSaugatResearch/3d_b2diff/b2diff/3d_layout_generation/MiDiffusion/room_features.json"
  config_path: "3d_layout_generation/MiDiffusion/config.yaml"
  checkpoint_path: "/media/ajad/YourBook/AshokSaugatResearchBackup/AshokSaugatResearch/3d_b2diff/b2diff/3d_layout_generation/MiDiffusion/output/log/pretrained_3d_layout_custom_attn/model_06000"
  dataset_directory: "/media/ajad/YourBook/AshokSaugatResearchBackup/AshokSaugatResearch/steerable-scene-generation/MiData/bedroom"
  annotation_file: "bedroom_threed_front_splits.csv"
  
  # Dataset settings
  dataset_type: "cached_threedfront"
  encoding_type: "cached_diffusion_cosin_angle_wocm"
  augmentations: ["fixed_rotations"]
  train_stats: "dataset_stats.txt"
  room_layout_size: "64,64"
  
  # Network architecture
  network_type: "diffusion_scene_layout_mixed"
  sample_num_points: 12  # max_length
  angle_dim: 2
  
  # Room mask condition
  room_mask_condition: true
  room_latent_dim: 64
  
  # Feature extractor
  feature_extractor_name: "pointnet_simple"
  feature_extractor_units: [4, 64, 64, 512, 64]
  
  # Diffusion parameters
  time_num: 1000
  diffusion_semantic:
    att_1: 0.99999
    att_T: 0.000009
    ctt_1: 0.000009
    ctt_T: 0.99999
    model_output_type: 'x0'
    mask_weight: 1
    auxiliary_loss_weight: 0.0005
    adaptive_auxiliary_loss: true
  
  diffusion_geometric:
    schedule_type: 'linear'
    beta_start: 0.0001
    beta_end: 0.02
    loss_type: 'mse'
    model_mean_type: 'eps'
    model_var_type: 'fixedsmall'
  
  # Denoising network (Transformer)
  net_type: "transformer"
  n_layer: 8
  n_embd: 512
  n_head: 4
  dim_feedforward: 2048
  dropout: 0.1
  activate: 'GELU'
  timestep_type: 'adalayernorm_abs'
  mlp_type: 'fc'
  seperate_all: true
  

# Sampling configuration
sample:
  num_steps: 20
  cfg: true
  guidance_scale: 5.0
  beta: 1.0
  eta: 1.0
  batch_size: 16
  num_batches_per_epoch: 16
  save_interval: 2
  no_branching: false
  no_selection: false
  normalize_all: false # if true uses the stat of the whole batch for norm instead of the per prompt reward norm
  fk: false
  num_particles: 4
  only_best_fk: false
  fk_mix_ratio: 1  # For mixed sampling: 0.0=all vanilla, 1.0=all FK, 0.5=50/50 mix
  resample_frequency: 5
  resampling_t_start: 5
  resampling_t_end: 15
  potential_type: "max" # "diff", "rt"
  fk_lambda: 2.0
  brach_at_before_fk: -1
  always_branch_at: -1
  fk_then_branch_at: -1
  save_train_samples_no_train: false # whether to save the samples generated in the sampling stage without training or not (for visualization)
  save_per_sample_trajectories: false # save one pkl per sample with full noise→final trajectory + ThreedFrontResults
# Training configuration
train:
  batch_size: 16
  use_8bit_adam: false
  learning_rate: 3e-4 # 0.0001 in b2 but 3e-4 in ddpo
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 0.0001
  adam_epsilon: 0.00000001
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  num_inner_epochs: 1
  cfg: true
  timestep_fraction: 1.0
  alpha: 1.0
  beta: 0
  beta1: 1
  beta2: 1
  eps: 1e-4 # 0.1 in b2 but 1e-4 in ddpo
  num_epochs: 2
  adv_clip_max: 5
  save_interval: 2
  num_checkpoint_limit: 21
  incremental_training: false # incremental training but the random timesteps in each loop
  only_train_steps: -1 # if paired with incremental_training, any n timesteps training
  uniformly_sample_timesteps: false # if true, sample the timesteps uniformly instead of choosing randomly
  incremental_timesteps: [5,10,15,20]
  num_stages_per_increment: 10
  score_fn_training: false # whether to train the score function or not
  bpt: "default" # "custom" / anything else for default b2 paper's
  only_last_n_steps: -1 # if > 0, only train the last n steps


# Evaluation & Selection configuration
eval:
  pos_threshold: 0.5  # PosThreshold from bash script
  neg_threshold: -0.5  # NegThreshold from bash script
  history_cnt: 8  # History_Cnt from bash script

# Wandb configuration
# Single run tracks all stages with hierarchical logging:
# - stage/index, stage/time_seconds
# - sampling/stage_X/* (per-stage sampling metrics)
# - rewards/stage_X/* (raw & normalized scores, mean/std per prompt)
# - selection/stage_X/* (num selected, pos/neg counts)
# - training/stage_X/* (loss, gradients per stage)
# - pipeline/* (overall progress, total time)
wandb:
  entity: "pramish-paudel-insait"
  project: "b2diff"  # Single run for entire pipeline
  enabled: true
  log_model: false

# Hydra configuration
hydra:
  run:
    dir: logs/${exp_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: logs/${exp_name}
    subdir: ${hydra.job.num}
